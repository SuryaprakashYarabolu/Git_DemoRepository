# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: com.eaton.dev.grcreate
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: BAS_AGUCLNT100_HTTPS
          url: http://agu.eaton.com:50001
          client: '100'
        app:
          name: ZFIORI_EWM_REC
          description: Receiving Application
          package: ZEWM_IBRCV
          transport: AGUK910897
        exclude:
          - /test/
